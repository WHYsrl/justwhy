<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHY — CMS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
  --text: #e0e0e0; --text2: #888; --accent: #c8ff00; --danger: #ff4444;
  --font: 'Inter', sans-serif; --display: 'Space Grotesk', sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* --- LOGIN --- */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border); padding: 3rem;
  width: 100%; max-width: 400px;
}
.login-box h1 {
  font-family: var(--display); font-size: 1.5rem; font-weight: 700;
  letter-spacing: 0.1em; margin-bottom: 0.5rem;
}
.login-box p { font-size: 0.85rem; color: var(--text2); margin-bottom: 2rem; }
.login-box .error { color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem; display: none; }

/* --- FORM ELEMENTS --- */
label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.5rem; }
input[type="text"], input[type="password"], input[type="email"], textarea, select {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 0.75rem 1rem; font-family: var(--font); font-size: 0.9rem;
  margin-bottom: 1.25rem; outline: none; transition: border-color 0.3s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { min-height: 100px; resize: vertical; }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--accent); color: var(--bg); border: none;
  padding: 0.75rem 1.5rem; font-family: var(--font); font-size: 0.85rem;
  font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: all 0.3s;
}
.btn:hover { filter: brightness(1.1); }
.btn-outline {
  background: transparent; border: 1px solid var(--border); color: var(--text);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; }

/* --- LAYOUT --- */
#app { display: none; }
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 2rem; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
}
.admin-header h1 { font-family: var(--display); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; }
.admin-header-actions { display: flex; gap: 0.75rem; align-items: center; }

.admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 60px); }
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 1.5rem 0;
}
.sidebar a {
  display: block; padding: 0.65rem 1.5rem; color: var(--text2);
  text-decoration: none; font-size: 0.85rem; font-weight: 500;
  transition: all 0.2s; border-left: 2px solid transparent;
}
.sidebar a:hover { color: var(--text); background: var(--surface2); }
.sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
.sidebar .sidebar-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text2); padding: 1.5rem 1.5rem 0.5rem;
}

.content-area { padding: 2rem 3rem; max-width: 900px; }
.content-area h2 {
  font-family: var(--display); font-size: 1.5rem; font-weight: 600;
  margin-bottom: 0.5rem;
}
.content-area .subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 1.5rem; margin-bottom: 1.5rem;
}
.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

.lang-tabs {
  display: flex; gap: 0; margin-bottom: 1.5rem;
}
.lang-tab {
  padding: 0.5rem 1.25rem; font-size: 0.8rem; font-weight: 600;
  letter-spacing: 0.08em; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border); color: var(--text2);
  transition: all 0.2s;
}
.lang-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.save-toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: var(--accent); color: var(--bg);
  padding: 0.75rem 1.5rem; font-weight: 600; font-size: 0.85rem;
  transform: translateY(100px); opacity: 0; transition: all 0.3s;
  z-index: 1000;
}
.save-toast.show { transform: translateY(0); opacity: 1; }

.items-list { display: flex; flex-direction: column; gap: 1rem; }
.item-row {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center;
}
.item-row h4 { font-size: 0.95rem; }
.item-row .meta { font-size: 0.8rem; color: var(--text2); }

@media (max-width: 768px) {
  .admin-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content-area { padding: 1.5rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>WHY</h1>
    <p>Content Management System</p>
    <div class="error" id="loginError">Invalid credentials</div>
    <label>Username</label>
    <input type="text" id="loginUser" placeholder="admin">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()" style="width:100%;justify-content:center;">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="admin-header">
    <h1>WHY CMS</h1>
    <div class="admin-header-actions">
      <button class="btn btn-sm" onclick="saveAll()">Save All</button>
      <button class="btn btn-sm btn-outline" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="admin-layout">
    <div class="sidebar">
      <div class="sidebar-label">Content</div>
      <a href="#" onclick="showSection('hero')" class="active" data-section="hero">Hero</a>
      <a href="#" onclick="showSection('manifesto')" data-section="manifesto">Manifesto</a>
      <a href="#" onclick="showSection('services')" data-section="services">Services</a>
      <a href="#" onclick="showSection('work')" data-section="work">Work / Portfolio</a>
      <a href="#" onclick="showSection('team')" data-section="team">Team</a>
      <a href="#" onclick="showSection('contact')" data-section="contact">Contact</a>
      <a href="#" onclick="showSection('clients')" data-section="clients">Clients</a>
      <div class="sidebar-label">Brief & AI</div>
      <a href="#" onclick="showSection('briefQuestions')" data-section="briefQuestions">Brief Questions</a>
      <a href="#" onclick="showSection('submissions')" data-section="submissions">Submissions</a>
      <a href="#" onclick="showSection('contactReqs')" data-section="contactReqs">Contact Requests</a>
      <a href="#" onclick="showSection('aicontext')" data-section="aicontext">AI Context</a>
      <div class="sidebar-label">Visual</div>
      <a href="#" onclick="showSection('particles')" data-section="particles">Particles</a>
      <div class="sidebar-label">Settings</div>
      <a href="#" onclick="showSection('privacy')" data-section="privacy">Privacy Policy</a>
      <a href="#" onclick="showSection('onboarding')" data-section="onboarding">Onboarding</a>
      <a href="#" onclick="showSection('settings')" data-section="settings">Settings</a>
    </div>
    <div class="content-area" id="contentArea">
      <!-- Dynamic content -->
    </div>
  </div>
</div>

<div class="save-toast" id="saveToast">Changes saved ✓</div>

<script>
let content = {};
let editLang = 'en';

// --- AUTH ---
async function doLogin() {
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('loginUser').value,
      password: document.getElementById('loginPass').value
    })
  });
  if (res.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadContent();
  } else {
    const el = document.getElementById('loginError');
    el.style.display = 'block';
    el.textContent = 'Invalid credentials';
  }
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
}

// Check existing session
fetch('/api/session').then(r => r.json()).then(d => {
  if (d.authenticated) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadContent();
  }
});

// --- CONTENT ---
async function loadContent() {
  const res = await fetch('/api/content');
  content = await res.json();
  showSection('hero');
}

async function saveAll() {
  const res = await fetch('/api/content', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(content)
  });
  if (res.ok) {
    const toast = document.getElementById('saveToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
}

function showSection(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`.sidebar a[data-section="${name}"]`);
  if (link) link.classList.add('active');

  const area = document.getElementById('contentArea');
  const renderers = {
    hero: renderHero, manifesto: renderManifesto, services: renderServices,
    work: renderWork, team: renderTeam, contact: renderContact,
    clients: renderClients, briefQuestions: renderBriefQuestions, submissions: renderSubmissions, contactReqs: renderContactReqs, aicontext: renderAIContext, particles: renderParticles, privacy: renderPrivacy, onboarding: renderOnboarding, settings: renderSettings
  };
  if (renderers[name]) renderers[name](area);
}

function langTabs(onChange) {
  return `<div class="lang-tabs">
    <div class="lang-tab ${editLang==='en'?'active':''}" onclick="editLang='en';${onChange}">EN</div>
    <div class="lang-tab ${editLang==='it'?'active':''}" onclick="editLang='it';${onChange}">IT</div>
  </div>`;
}

function field(label, path, type='text') {
  const val = getNestedValue(content, path) || '';
  const escaped = String(val).replace(/"/g, '&quot;');
  if (type === 'textarea') {
    return `<label>${label}</label><textarea oninput="setNestedValue(content,'${path}',this.value)">${val}</textarea>`;
  }
  return `<label>${label}</label><input type="${type}" value="${escaped}" oninput="setNestedValue(content,'${path}',this.value)">`;
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => o && o[k], obj);
}

function setNestedValue(obj, path, val) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => o[k], obj);
  target[last] = val;
}

// --- RENDERERS ---
function renderHero(el) {
  el.innerHTML = `
    <h2>Hero Section</h2>
    <p class="subtitle">The first thing visitors see.</p>
    ${langTabs("renderHero(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Pre-title', `hero.${editLang}.pre`)}
      ${field('Title (HTML allowed)', `hero.${editLang}.title`)}
      ${field('Subtitle', `hero.${editLang}.sub`, 'textarea')}
      ${field('CTA Button', `hero.${editLang}.cta`)}
    </div>`;
}

function renderManifesto(el) {
  el.innerHTML = `
    <h2>Manifesto</h2>
    <p class="subtitle">Your positioning statement. HTML tags like &lt;strong&gt; are supported.</p>
    ${langTabs("renderManifesto(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Label', `manifesto.${editLang}.label`)}
      ${field('Text (HTML allowed)', `manifesto.${editLang}.text`, 'textarea')}
    </div>`;
}

function renderServices(el) {
  const items = content.services.items || [];
  let html = `
    <h2>Services</h2>
    <p class="subtitle">Edit service cards. Changes apply to both onboarding matching and display.</p>
    ${langTabs("renderServices(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Section Label', `services.${editLang}.label`)}
      ${field('Section Title', `services.${editLang}.title`)}
    </div>`;

  items.forEach((item, i) => {
    html += `<div class="card">
      <h3>${item[editLang]?.title || item.id}</h3>
      ${field('Title', `services.items.${i}.${editLang}.title`)}
      ${field('Description', `services.items.${i}.${editLang}.desc`, 'textarea')}
      <label>Tags (comma-separated)</label>
      <input type="text" value="${item.tags.join(', ')}" oninput="content.services.items[${i}].tags=this.value.split(',').map(s=>s.trim())">
    </div>`;
  });
  el.innerHTML = html;
}

function renderWork(el) {
  const items = content.work.items || [];
  let html = `
    <h2>Work / Portfolio</h2>
    <p class="subtitle">Manage case studies with descriptions and image galleries.</p>
    ${langTabs("renderWork(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Section Label', `work.${editLang}.label`)}
      ${field('Section Title', `work.${editLang}.title`)}
      <div style="margin-top:1rem;display:flex;align-items:center;gap:.75rem">
        <label style="margin:0;white-space:nowrap">Work Section</label>
        <div style="display:flex;align-items:center;gap:.5rem">
          <input type="checkbox" ${content.work?.section_enabled !== false ? 'checked' : ''} onchange="content.work.section_enabled=this.checked" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer">
          <span style="font-size:.8rem;color:var(--text2)">${content.work?.section_enabled !== false ? 'Visible on homepage' : 'Hidden — entire Work section is disabled'}</span>
        </div>
      </div>
      <div style="margin-top:.75rem;display:flex;align-items:center;gap:.75rem">
        <label style="margin:0;white-space:nowrap">Case Histories Section</label>
        <div style="display:flex;align-items:center;gap:.5rem">
          <input type="checkbox" id="chkCaseHistories" ${content.work?.case_histories_enabled !== false ? 'checked' : ''} onchange="content.work.case_histories_enabled=this.checked" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer">
          <span style="font-size:.8rem;color:var(--text2)">${content.work?.case_histories_enabled !== false ? 'Enabled — clicking a project opens its detail page' : 'Disabled — projects are shown without detail pages'}</span>
        </div>
      </div>
    </div>`;

  items.forEach((item, i) => {
    // Ensure en/it and gallery exist
    if (!item.en) item.en = { description: '' };
    if (!item.it) item.it = { description: '' };
    if (!item.gallery) item.gallery = [];

    html += `<div class="card">
      <h3>${item.client} — ${item.title}</h3>
      ${field('Title', `work.items.${i}.title`)}
      ${field('Client', `work.items.${i}.client`)}
      ${field('Category (EN)', `work.items.${i}.category_en`)}
      ${field('Category (IT)', `work.items.${i}.category_it`)}
      ${field('Description (' + editLang.toUpperCase() + ')', `work.items.${i}.${editLang}.description`, 'textarea')}
      <label>Cover Image</label>
      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.25rem">
        ${item.image ? `<img src="${item.image}" style="width:80px;height:60px;object-fit:cover;border:1px solid var(--border)">` : '<div style="width:80px;height:60px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--text2)">No image</div>'}
        <input type="file" accept="image/*" onchange="uploadWorkImage(${i},'cover',this)" style="font-size:.8rem">
      </div>
      <label>Gallery Images</label>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem" id="workGallery${i}">
        ${item.gallery.map((img, gi) => `<div style="position:relative;width:80px;height:60px;border:1px solid var(--border)">
          <img src="${img}" style="width:100%;height:100%;object-fit:cover">
          <button style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:0;width:18px;height:18px;font-size:.7rem;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center" onclick="removeGalleryImg(${i},${gi})">✕</button>
        </div>`).join('')}
      </div>
      <input type="file" accept="image/*" multiple onchange="uploadWorkImage(${i},'gallery',this)" style="font-size:.8rem;margin-bottom:1rem">
      <label style="margin-top:1rem">Preview Video URL <span style="font-size:.7rem;color:var(--text2)">(YouTube or Vimeo — plays on hover in grid)</span></label>
      <input type="text" value="${item.preview_video||''}" onchange="setNestedValue(content,'work.items.${i}.preview_video',this.value)" placeholder="https://www.youtube.com/watch?v=... or https://vimeo.com/..." style="width:100%;padding:.5rem .75rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.82rem;margin-bottom:1rem">
      <label>Detail Page Video URL <span style="font-size:.7rem;color:var(--text2)">(YouTube or Vimeo — shown in case history page)</span></label>
      <input type="text" value="${item.detail_video||''}" onchange="setNestedValue(content,'work.items.${i}.detail_video',this.value)" placeholder="https://www.youtube.com/watch?v=... or https://vimeo.com/..." style="width:100%;padding:.5rem .75rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.82rem;margin-bottom:1rem">
      <div style="margin-top:.5rem"><button class="btn btn-sm btn-danger" onclick="removeWorkItem(${i})">Remove project</button></div>
    </div>`;
  });

  html += `<button class="btn btn-outline btn-sm" onclick="addWorkItem()">+ Add project</button>`;
  el.innerHTML = html;
}

function addWorkItem() {
  content.work.items.push({
    id: 'new-' + Date.now(),
    category_en: 'New Category', category_it: 'Nuova Categoria',
    title: 'New Project', client: 'Client Name',
    tags: [], gradient: ['#1a1a1a', '#2a2a2a', '#1a1a1a']
  });
  renderWork(document.getElementById('contentArea'));
}

function renderTeam(el) {
  const members = content.team.members || [];
  let html = `
    <h2>Team</h2>
    <p class="subtitle">Edit team member profiles.</p>
    ${langTabs("renderTeam(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Section Label', `team.${editLang}.label`)}
      ${field('Section Title', `team.${editLang}.title`)}
    </div>`;

  members.forEach((m, i) => {
    html += `<div class="card">
      <h3>${m.name}</h3>
      ${field('Name', `team.members.${i}.name`)}
      ${field('Role', `team.members.${i}.role`)}
      ${field('Initials', `team.members.${i}.initials`)}
      ${field('Bio', `team.members.${i}.${editLang}.bio`, 'textarea')}
      ${field('Photo URL', `team.members.${i}.photo`)}
      <label>Upload Photo</label>
      <div style="display:flex;gap:1rem;align-items:center">
        ${m.photo ? `<img src="${m.photo}" style="width:60px;height:60px;object-fit:cover;border:1px solid var(--border)">` : '<div style="width:60px;height:60px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--text2)">No photo</div>'}
        <input type="file" accept="image/*" onchange="uploadTeamPhoto(${i},this)" style="font-size:.8rem">
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderContact(el) {
  if (!content.contact[editLang]) content.contact[editLang] = { label: '', title: '', cta: '' };
  if (!content.clients_label) content.clients_label = { en: 'Trusted by', it: 'Ci hanno scelto' };
  el.innerHTML = `
    <h2>Contact</h2>
    <p class="subtitle">Contact section details.</p>
    ${langTabs("renderContact(document.getElementById('contentArea'))")}
    <div class="card">
      ${field('Section Label', `contact.${editLang}.label`)}
      ${field('Section Title', `contact.${editLang}.title`)}
      ${field('CTA Button Text', `contact.${editLang}.cta`)}
      ${field('Email', 'contact.email', 'email')}
      ${field('Company Name', 'contact.company')}
      ${field('Location', 'contact.location')}
    </div>
    <div class="card">
      <h3>Clients Section Label</h3>
      ${field('Clients Label (' + editLang.toUpperCase() + ')', `clients_label.${editLang}`)}
    </div>`;
}

function renderClients(el) {
  const clients = content.clients || [];
  el.innerHTML = `
    <h2>Clients</h2>
    <p class="subtitle">Client names displayed in the trust strip.</p>
    <div class="card">
      <label>Clients (one per line)</label>
      <textarea style="min-height:250px" oninput="content.clients=this.value.split('\\n').map(s=>s.trim()).filter(Boolean)">${clients.join('\n')}</textarea>
    </div>`;
}

function renderOnboarding(el) {
  el.innerHTML = `
    <h2>Onboarding Questions</h2>
    <p class="subtitle">Customize the interactive onboarding that visitors see on first load.</p>
    ${langTabs("renderOnboarding(document.getElementById('contentArea'))")}
    <div class="card">
      <h3>General</h3>
      ${field('Welcome text', `onboarding.${editLang}.welcome`)}
      ${field('Skip button', `onboarding.${editLang}.skip`)}
      ${field('Next button', `onboarding.${editLang}.next`)}
      ${field('Enter button', `onboarding.${editLang}.start`)}
    </div>
    <div class="card">
      <h3>Question 1</h3>
      ${field('Question', `onboarding.${editLang}.q1.question`)}
    </div>
    <div class="card">
      <h3>Question 2</h3>
      ${field('Question', `onboarding.${editLang}.q2.question`)}
    </div>
    <div class="card">
      <h3>Question 3</h3>
      ${field('Question', `onboarding.${editLang}.q3.question`)}
    </div>`;
}

function renderBriefQuestions(el) {
  // Ensure brief_questions structure exists in content
  if (!content.brief_questions) {
    content.brief_questions = {
      sectors: { en: ['Fashion & Luxury','Corporate','Entertainment','Architecture','Tech & Innovation'], it: ['Fashion & Lusso','Corporate','Entertainment','Architettura','Tech & Innovation'] },
      goals: { en: ['Launch a new product or experience','Engage & retain our audience','Transform a physical space','Innovate our communication'], it: ['Lanciare un nuovo prodotto o esperienza','Coinvolgere e fidelizzare il pubblico','Trasformare uno spazio fisico','Innovare la nostra comunicazione'] },

  el.innerHTML = '<h2>Submissions</h2><p class="subtitle">Loading...</p>';

    const res = await fetch('/api/submissions?status=' + _subsFilter);

    _subsSelected.clear();
    _subsDetailId = null;
    renderSubsList(el);

function subsToggle(id, checked) {
  if (checked) _subsSelected.add(id); else _subsSelected.delete(id);
  renderSubsList(document.getElementById('contentArea'));
}
function subsToggleAll(checked) {
  const q = _subsSearch.toLowerCase();
  const filtered = q ? _subsData.filter(s => (s.name||'').toLowerCase().includes(q)||(s.email||'').toLowerCase().includes(q)||(s.company||'').toLowerCase().includes(q)||(s.sector||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q)) : _subsData;
  _subsSelected.clear();
  if (checked) filtered.forEach(s => _subsSelected.add(s.id));
  renderSubsList(document.getElementById('contentArea'));
}

async function subsBulk(action) {
  const ids = [..._subsSelected];
  const realAction = (action === 'archive' && _subsFilter === 'archived') ? 'restore' : action;
  const label = realAction === 'delete' ? 'permanently delete' : realAction;
  if (!confirm(`${label} ${ids.length} submission(s)?`)) return;
  await fetch('/api/submissions/bulk', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ids, action: realAction }) });
  renderSubmissions(document.getElementById('contentArea'));
}

async function subsSingleAction(id, action) {
  const label = action === 'delete' ? 'permanently delete' : action;

    await fetch('/api/submissions/bulk', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ids: [id], action }) });
  }
  renderSubmissions(document.getElementById('contentArea'));
}

async function uploadTeamPhoto(memberIndex, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('File too large (max 2MB)'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    try {
      const res = await fetch('/api/upload-photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberIndex, dataUrl })
      });
      if (res.ok) {
        content.team.members[memberIndex].photo = dataUrl;
        renderTeam(document.getElementById('contentArea'));
        const toast = document.getElementById('saveToast');
        toast.textContent = 'Photo uploaded ✓';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      } else { alert('Upload failed'); }
    } catch(e) { alert('Upload error'); }
  };
  reader.readAsDataURL(file);
}

// Work image uploads
function uploadWorkImage(itemIndex, type, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let processed = 0;
  files.forEach(file => {
    if (file.size > 3 * 1024 * 1024) { alert('File too large (max 3MB): ' + file.name); processed++; return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      if (type === 'cover') {
        content.work.items[itemIndex].image = dataUrl;
      } else {
        if (!content.work.items[itemIndex].gallery) content.work.items[itemIndex].gallery = [];
        content.work.items[itemIndex].gallery.push(dataUrl);
      }
      processed++;
      if (processed === files.length) {
        renderWork(document.getElementById('contentArea'));
        const toast = document.getElementById('saveToast');
        toast.textContent = 'Image(s) added — remember to Save All ✓';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      }
    };
    reader.readAsDataURL(file);
  });
}

function removeGalleryImg(itemIndex, imgIndex) {
  content.work.items[itemIndex].gallery.splice(imgIndex, 1);
  renderWork(document.getElementById('contentArea'));
}

function removeWorkItem(itemIndex) {
  if (!confirm('Remove this project?')) return;
  content.work.items.splice(itemIndex, 1);
  renderWork(document.getElementById('contentArea'));
}

let particleShapes = [];
let particleSettings = {
  color: '#c8ff00', bgColor: '#c8ff00',
  figCount: 1500, bgCount: 500, burstCount: 250,
  figSize: 3.0, bgSize: 0.12, burstSize: 4.0,
  figOpacity: 0.8, bgOpacity: 0.22,
  holdTime: 5.5, morphDuration: 2.2,
  edgeOpacity: 0.08, edgeMaxDist: 1.8,
  spreadX: 38, spreadY: 45,
};

async function loadParticleData() {
  const [shapesRes, settingsRes] = await Promise.all([
    fetch('/api/particle-shapes'),
    fetch('/api/particle-settings')
  ]);
  particleShapes = await shapesRes.json();
  const s = await settingsRes.json();
  if (s && Object.keys(s).length) particleSettings = { ...particleSettings, ...s };
}

async function saveParticleSettings() {
  await fetch('/api/particle-settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(particleSettings)
  });
  const toast = document.getElementById('saveToast');
  toast.textContent = 'Particle settings saved ✓';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function uploadParticleShape() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/png,image/svg+xml,image/webp';
  input.multiple = true;
  input.onchange = async () => {
    for (const file of input.files) {
      if (file.size > 3 * 1024 * 1024) { alert('File too large (max 3MB): ' + file.name); continue; }
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(file); });
      const name = file.name.replace(/\.[^.]+$/, '');
      await fetch('/api/particle-shapes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, image_data: dataUrl })
      });
    }
    await loadParticleData();
    renderParticles(document.getElementById('contentArea'));
  };
  input.click();
}

async function deleteParticleShape(id) {
  if (!confirm('Delete this shape?')) return;
  await fetch('/api/particle-shapes/' + id, { method: 'DELETE' });
  await loadParticleData();
  renderParticles(document.getElementById('contentArea'));
}

async function moveParticleShape(id, dir) {
  const idx = particleShapes.findIndex(s => s.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= particleShapes.length) return;
  const order = particleShapes.map(s => s.id);
  [order[idx], order[swapIdx]] = [order[swapIdx], order[idx]];
  await fetch('/api/particle-shapes-order', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ order })
  });
  await loadParticleData();
  renderParticles(document.getElementById('contentArea'));
}

async function renameParticleShape(id) {
  const shape = particleShapes.find(s => s.id === id);
  const name = prompt('Shape name:', shape?.name || '');
  if (!name) return;
  await fetch('/api/particle-shapes/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  await loadParticleData();
  renderParticles(document.getElementById('contentArea'));
}

function pSlider(label, key, min, max, step, unit='') {
  const val = particleSettings[key];
  return `<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem">
    <span style="min-width:130px;font-size:.78rem;color:var(--text2)">${label}</span>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${val}"
      style="flex:1;accent-color:var(--accent)"
      oninput="particleSettings['${key}']=parseFloat(this.value);this.nextElementSibling.textContent=this.value+'${unit}'">
    <span style="min-width:55px;font-size:.78rem;text-align:right">${val}${unit}</span>
  </div>`;
}

function pColor(label, key) {
  const val = particleSettings[key];
  return `<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem">
    <span style="min-width:130px;font-size:.78rem;color:var(--text2)">${label}</span>
    <input type="color" value="${val}" style="width:40px;height:28px;border:1px solid var(--border);background:var(--bg);cursor:pointer"
      oninput="particleSettings['${key}']=this.value">
  </div>`;
}

async function renderParticles(el) {
  await loadParticleData();
  el.innerHTML = `
    <h2>Particle System</h2>
    <p class="subtitle">Upload PNG silhouettes and configure the interactive particle background.</p>

    <div class="card">
      <h3 style="display:flex;justify-content:space-between;align-items:center">
        Shapes (${particleShapes.length})
        <button class="btn btn-sm" onclick="uploadParticleShape()">+ Upload PNG</button>
      </h3>
      <p style="font-size:.78rem;color:var(--text2);margin-bottom:1rem">
        Upload white silhouettes on transparent background (PNG). The particles will fill the opaque areas.
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem">
        ${particleShapes.map((s,i) => `
          <div style="background:var(--bg);border:1px solid var(--border);padding:.5rem;position:relative">
            <img src="${s.image_data}" style="width:100%;aspect-ratio:1;object-fit:contain;background:#111;display:block;image-rendering:auto">
            <div style="padding:.4rem 0 .2rem;font-size:.75rem;text-align:center;color:var(--text2)">${s.name}</div>
            <div style="display:flex;gap:.3rem;justify-content:center">
              <button class="btn btn-sm btn-outline" style="padding:2px 6px;font-size:.7rem" onclick="moveParticleShape(${s.id},-1)" ${i===0?'disabled':''}>&#9650;</button>
              <button class="btn btn-sm btn-outline" style="padding:2px 6px;font-size:.7rem" onclick="moveParticleShape(${s.id},1)" ${i===particleShapes.length-1?'disabled':''}>&#9660;</button>
              <button class="btn btn-sm btn-outline" style="padding:2px 6px;font-size:.7rem" onclick="renameParticleShape(${s.id})">&#9998;</button>
              <button class="btn btn-sm btn-danger" style="padding:2px 6px;font-size:.7rem" onclick="deleteParticleShape(${s.id})">&#10005;</button>
            </div>
          </div>
        `).join('')}
        ${particleShapes.length === 0 ? '<p style="grid-column:1/-1;color:var(--text2);font-size:.85rem;padding:2rem;text-align:center">No shapes uploaded yet. Upload PNG silhouettes to create particle figures.<br>Fallback: built-in procedural shapes (human, phone, laptop, etc.)</p>' : ''}
      </div>
    </div>

    <div class="card">
      <h3>Figure Layer</h3>
      ${pColor('Color', 'color')}
      ${pSlider('Particles', 'figCount', 500, 3000, 100)}
      ${pSlider('Point size', 'figSize', 1.0, 6.0, 0.5)}
      ${pSlider('Opacity', 'figOpacity', 0.3, 1.0, 0.05)}
      ${pSlider('Spread X', 'spreadX', 15, 60, 1)}
      ${pSlider('Spread Y', 'spreadY', 15, 60, 1)}
    </div>

    <div class="card">
      <h3>Background Layer</h3>
      ${pColor('BG Color', 'bgColor')}
      ${pSlider('BG Particles', 'bgCount', 100, 1000, 50)}
      ${pSlider('BG Size', 'bgSize', 0.05, 0.5, 0.01)}
      ${pSlider('BG Opacity', 'bgOpacity', 0.05, 0.5, 0.01)}
    </div>

    <div class="card">
      <h3>Morphing</h3>
      ${pSlider('Hold time', 'holdTime', 2, 15, 0.5, 's')}
      ${pSlider('Morph duration', 'morphDuration', 0.5, 5, 0.1, 's')}
    </div>

    <div class="card">
      <h3>Click Burst</h3>
      ${pSlider('Burst particles', 'burstCount', 50, 500, 25)}
      ${pSlider('Burst size', 'burstSize', 1.0, 8.0, 0.5)}
    </div>

    <div class="card">
      <h3>Edges / Wireframe</h3>
      ${pSlider('Edge opacity', 'edgeOpacity', 0, 0.3, 0.01)}
      ${pSlider('Edge max distance', 'edgeMaxDist', 0.5, 4.0, 0.1)}
    </div>

    <div class="card">
      <h3>Mobile</h3>
      <label style="display:flex;align-items:center;gap:.75rem;cursor:pointer">
        <input type="checkbox" ${particleSettings.mobileTouchEnabled ? 'checked' : ''} onchange="particleSettings.mobileTouchEnabled=this.checked" style="width:18px;height:18px;accent-color:var(--ac,#c8ff00)">
        <span>Enable touch interaction on mobile</span>
      </label>
      <p style="font-size:.8rem;color:#888;margin-top:.5rem">When disabled, particles won't react to touch/swipe on mobile devices (better scroll UX).</p>
    </div>

    <div style="margin-top:1.5rem;display:flex;gap:1rem">
      <button class="btn" onclick="saveParticleSettings()">Save Settings</button>
    </div>
  `;
}

async function changePassword() {
  const res = await fetch('/api/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      currentPassword: document.getElementById('currentPass').value,
      newPassword: document.getElementById('newPass').value
    })
  });
  const data = await res.json();
  alert(res.ok ? 'Password updated!' : data.error);
}
</script>
</body>
</html>
